<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Adaptive OpenE2EE small-size shield logo</title>
  <desc id="desc">A split-color shield containing aligned O and E letterforms. Colors adapt to light or dark mode.</desc>
  <style>
    :root { --shield-left: #284D79; --shield-right: #19365F; --outline: #0B1D36; --accent: #4C78D0; --ink: #FFFFFF; }
    @media (prefers-color-scheme: dark) {
      :root { --shield-left: #FFFFFF; --shield-right: #EEF2F7; --outline: #D8E2F5; --accent: #5C82D4; --ink: #142D52; }
    }
  </style>
  
  <defs>
    <clipPath id="shield-right-half-adaptive">
      <rect x="256" width="256" height="512"/>
    </clipPath>
  </defs>
  <g>
    <path d="M256 36C305 61 355 74 420 79V238C420 340 355 418 256 470C157 418 92 340 92 238V79C157 74 207 61 256 36Z" fill="var(--shield-left)"/>
    <path d="M256 36C305 61 355 74 420 79V238C420 340 355 418 256 470C157 418 92 340 92 238V79C157 74 207 61 256 36Z" fill="var(--shield-right)" clip-path="url(#shield-right-half-adaptive)"/>
    <path d="M256 36C305 61 355 74 420 79V238C420 340 355 418 256 470C157 418 92 340 92 238V79C157 74 207 61 256 36Z" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linejoin="round"/>
    
    <path d="M148 174H244V338H148ZM174 199V313H218V199Z" fill="var(--ink)" fill-rule="evenodd"/>
    <path d="M270 174H370V199H298V240H360V265H298V313H370V338H270Z" fill="var(--ink)"/>
  </g>
</svg>
